<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hanz API | Documents</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"JetBrains Mono"', 'monospace'],
                        sans: ['"Inter"', 'sans-serif'],
                    },
                    colors: {
                        'fmn-blue': '#89CFF0',
                        'fmn-dark': '#6495ED',
                        'fmn-purple': '#B39DDB',
                        'fmn-bg': '#F0F8FF',
                        'term-bg': '#0f172a',
                        'term-header': '#1e293b',
                        'term-text': '#e2e8f0',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(137, 207, 240, 0.15)',
                        'card': '0 2px 10px -2px rgba(0, 0, 0, 0.05)',
                    },
                    animation: {
                        'blink': 'blink 1s step-end infinite',
                        'slide-down': 'slideDown 0.3s ease-out forwards',
                        'marquee': 'marquee 15s linear infinite',
                        'slide-in-right': 'slideInRight 0.4s ease-out forwards',
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                        'pulse-slow': 'pulseSlow 6s ease-in-out infinite',
                    },
                    keyframes: {
                        blink: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0' } },
                        slideDown: { '0%': { opacity: '0', transform: 'translateY(-10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        marquee: { '0%': { transform: 'translateX(100%)' }, '100%': { transform: 'translateX(-150%)' } },
                        slideInRight: { '0%': { opacity: '0', transform: 'translateX(15px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
                        fadeInUp: { '0%': { opacity: '0', transform: 'translateY(15px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        pulseSlow: { '0%, 100%': { opacity: '0.4', transform: 'scale(1)' }, '50%': { opacity: '0.8', transform: 'scale(1.15)' } },
                    },
                }
            }
        }
    </script>
    <style>
        html, body {
            max-width: 100vw;
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }

        #fixed-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -50;
            background-color: #F0F8FF;
            background-image: 
                linear-gradient(rgba(200, 200, 220, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(200, 200, 220, 0.2) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
        }
        @media (max-width: 768px) {
            #fixed-bg { background-size: 30px 30px; }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .json-key { color: #f87171; font-weight: 600; }
        .json-string { color: #a3e635; }
        .json-number { color: #60a5fa; font-weight: 600; }
        .json-boolean { color: #c084fc; font-style: italic; }
        .json-null { color: #94a3b8; }
        .json-key, .json-string, .json-number, .json-boolean, .json-null { display: inline-block; transition: all 0.3s ease; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        
        .response-area {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: top center;
        }
        
        .response-area.showing { animation: slideInRight 0.4s ease-out, fadeInUp 0.5s ease-out; }
        .response-area.success { border-color: #10b981 !important; box-shadow: 0 4px 20px rgba(16, 185, 129, 0.1); }
        .response-area.error { border-color: #ef4444 !important; box-shadow: 0 4px 20px rgba(239, 68, 68, 0.1); }
        
        .status-indicator { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-success { background-color: #10b981; box-shadow: 0 0 8px #10b981; animation: blink 1.5s infinite; }
        .status-error { background-color: #ef4444; box-shadow: 0 0 8px #ef4444; animation: blink 1.5s infinite; }
        .status-waiting { background-color: #f59e0b; box-shadow: 0 0 8px #f59e0b; animation: blink 1.5s infinite; }

        .soft-btn {
            --button-raise-level: 6px;
            --press-inset: 3px;
            --button-hover-pressure: 1.5;
            --transform-speed: 160ms;
            --radius: 12px;

            position: relative;
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
            user-select: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            display: block;
        }

        .soft-btn__wrapper {
            position: relative;
            display: block;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .soft-btn__wrapper::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: calc(100% - var(--button-raise-level));
            background: var(--side-color);
            border-radius: var(--radius);
            z-index: 1;
        }

        .soft-btn__content {
            position: relative;
            width: 100%;
            height: calc(100% - var(--button-raise-level));
            background: var(--surface-color);
            color: var(--text-color);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(0);
            transition: transform var(--transform-speed) ease-out;
            will-change: transform;
            backface-visibility: hidden;
            transform-origin: center;
            z-index: 2;
            border: var(--border-width) solid var(--border-color);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2);
        }

        .soft-btn__inner {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            z-index: 4;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .soft-btn--middle .soft-btn__content { transform: translateY(calc(1px * var(--button-hover-pressure))); }
        .soft-btn--left .soft-btn__content { transform: skewY(calc(-1deg * var(--button-hover-pressure))); }
        .soft-btn--right .soft-btn__content { transform: skewY(calc(1deg * var(--button-hover-pressure))); }

        .soft-btn--active .soft-btn__content {
            transform: translateY(var(--press-inset));
            transition: transform calc(var(--transform-speed) * 0.8) ease-out;
        }
        
        .soft-btn--active.soft-btn--left .soft-btn__content {
            transform: skewY(calc(-1deg * var(--button-hover-pressure))) translateY(var(--press-inset));
        }
        
        .soft-btn--active.soft-btn--right .soft-btn__content {
            transform: skewY(calc(1deg * var(--button-hover-pressure))) translateY(var(--press-inset));
        }

        .variant-lavender {
            --surface-color: #cec3fd;
            --side-color: #b489ff;
            --text-color: #2e1065;
            --border-color: #a36eff;
            --border-width: 2px;
        }

        @keyframes outlineSpin { 100% { transform: rotate(360deg); } }

        .category-btn { position: relative; z-index: 1; overflow: hidden; transition: all 0.3s ease; }
        .category-btn.animating { border-color: transparent !important; }
        .category-btn.animating::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent 0%, #89CFF0 25%, transparent 50%, #B39DDB 75%, transparent 100%);
            z-index: -2; animation: outlineSpin 0.5s linear infinite;
        }
        .category-btn.animating::after {
            content: ''; position: absolute; inset: 2px; background: white; border-radius: 0.75rem; z-index: -1;
        }

        #reminder-bar.show-bar {
            display: block;
            animation: slideDownReminder 0.4s ease-out;
        }
        @keyframes slideDownReminder {
            from { transform: translateY(-100%); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col font-sans selection:bg-fmn-blue selection:text-white antialiased">
    
    <div id="fixed-bg"></div>

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-[60] shadow-sm w-full border-b border-slate-100 animate-slide-down">
        <div class="max-w-7xl mx-auto px-5 h-16 flex items-center gap-4 justify-between">
            <div class="flex items-center gap-3 shrink-0 group">
                <a href="/" class="w-9 h-9 bg-slate-50 text-slate-600 flex items-center justify-center rounded-full hover:bg-fmn-blue hover:text-white transition-all duration-300 shadow-sm border border-slate-200 group-hover:border-fmn-blue hover:-translate-x-1">
                    <i class="fa-solid fa-arrow-left text-sm"></i>
                </a>
                <div class="flex flex-col justify-center">
                    <h1 id="nav-title" class="font-bold text-lg tracking-tight text-slate-800 leading-none">HANZ API</h1>
                    <span class="text-[9px] font-semibold text-fmn-dark tracking-widest mt-1">API PLATFORM</span>
                </div>
            </div>

            <div class="hidden md:flex flex-1 max-w-xl mx-auto overflow-hidden h-7 bg-slate-100 rounded-full flex items-center relative shadow-inner mx-4 border border-slate-200">
                <div id="running-text" class="text-slate-600 text-[10px] font-mono font-medium uppercase tracking-wider px-4 whitespace-nowrap animate-marquee inline-block min-w-full">
                    SYSTEM ONLINE • WAITING FOR CONFIG...
                </div>
            </div>

            <div class="w-9 h-9 bg-slate-50 text-slate-600 flex items-center justify-center rounded-full shadow-sm border border-slate-200 transition-all duration-500 hover:scale-110 opacity-0 cursor-default">
                <i class="fa-regular fa-circle text-lg"></i>
            </div>
        </div>
    </nav>

    <div id="reminder-bar" class="hidden sticky top-16 z-50 w-full bg-amber-50 border-b border-amber-200 shadow-sm transition-all duration-500">
        <div class="max-w-7xl mx-auto px-5 py-2.5 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 flex-1 min-w-0">
                <i class="fa-solid fa-bell text-amber-600 text-lg shrink-0"></i>
                <span id="reminder-text" class="text-sm font-medium text-amber-800 truncate"></span>
            </div>
            <button id="close-reminder" class="text-amber-500 hover:text-amber-800 transition-colors p-1">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
        </div>
    </div>

    <main class="flex-grow max-w-7xl mx-auto w-full px-5 py-8 grid lg:grid-cols-12 gap-8 items-start relative z-10 overflow-hidden">
        
        <aside class="lg:col-span-4 lg:sticky lg:top-24 flex flex-col gap-6 h-fit z-40 w-full max-w-full animate-slide-in-right">
            
            <div class="bg-white/80 backdrop-blur-md border border-white/50 p-5 shadow-soft rounded-xl relative overflow-hidden">
                <div class="absolute -right-10 -top-10 w-32 h-32 bg-fmn-blue/10 rounded-full blur-2xl animate-pulse-slow"></div>
                <div class="absolute -left-10 -bottom-10 w-32 h-32 bg-fmn-purple/10 rounded-full blur-2xl animate-pulse-slow" style="animation-delay: 2s;"></div>
                <div class="space-y-3 relative z-10">
                    <div class="flex justify-between items-center text-xs font-semibold bg-white p-3.5 rounded-lg text-slate-600 border border-slate-100 shadow-card hover:shadow-md hover:-translate-y-1 transition-all duration-300">
                        <span class="flex items-center gap-2"><i class="fa-regular fa-clock text-fmn-blue"></i> TIME (WIB)</span>
                        <span id="server-time" class="text-slate-800 font-mono font-bold tracking-tight">--:--:--</span>
                    </div>
                    <div class="flex justify-between items-center text-xs font-semibold bg-white p-3.5 rounded-lg text-slate-600 border border-slate-100 shadow-card hover:shadow-md hover:-translate-y-1 transition-all duration-300">
                        <span class="flex items-center gap-2"><i class="fa-regular fa-calendar text-fmn-blue"></i> DATE</span>
                        <span id="server-date" class="text-slate-800 font-mono tracking-tight">--/--/----</span>
                    </div>
                    <div class="flex justify-between items-center text-xs font-semibold bg-white p-3.5 rounded-lg text-slate-600 border border-slate-100 shadow-card hover:shadow-md hover:-translate-y-1 transition-all duration-300">
                        <span class="flex items-center gap-2"><i class="fa-solid fa-chart-line text-fmn-purple"></i> VISITOR</span>
                        <span id="stat-visitors" class="text-fmn-purple font-bold text-sm">0</span>
                    </div>
                </div>
            </div>

            <div class="relative group">
                <input type="text" id="search-input" placeholder="Search Endpoint..." 
                    class="w-full h-12 border border-slate-200 px-5 pl-11 font-medium text-sm text-slate-700 rounded-xl shadow-sm focus:outline-none focus:ring-4 focus:ring-fmn-blue/10 focus:border-fmn-blue transition-all duration-300 placeholder:text-slate-400 bg-white/90 backdrop-blur hover:border-slate-300 hover:shadow-md">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-[14px] text-slate-400 group-hover:text-fmn-blue transition-all duration-300 group-hover:scale-110"></i>
            </div>
        </aside>

        <section class="lg:col-span-8 min-h-[50vh] w-full max-w-full">
            <div id="api-container" class="space-y-5 opacity-0 translate-y-4 transition-all duration-700 w-full"></div>
            
            <div id="no-results" class="hidden flex-col items-center justify-center py-20 text-center opacity-70">
                <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-4 transition-transform hover:scale-110">
                    <i class="fa-solid fa-magnifying-glass text-3xl text-slate-400"></i>
                </div>
                <p class="font-semibold text-lg text-slate-600">No endpoints found</p>
                <p class="text-sm text-slate-400 mt-1">Try searching with a different keyword</p>
            </div>
        </section>
    </main>

    <div id="custom-toast" class="fixed bottom-6 right-6 z-[100] transform translate-y-32 opacity-0 transition-all duration-300">
        <div class="bg-slate-800 text-white px-5 py-3.5 font-medium text-sm shadow-xl rounded-xl flex items-center gap-3 border border-slate-700 animate-slide-in-right">
            <div class="w-6 h-6 bg-green-500/20 text-green-400 rounded-full flex items-center justify-center"><i class="fa-solid fa-check text-xs"></i></div>
            <span id="toast-message" class="tracking-wide">SUCCESS</span>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
